<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Kick studio - face reveal + focal points</title>
<link rel="icon" href="data:,">
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #000; font-family: system-ui, sans-serif; }
  #c  { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2; }
  #bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: fill; z-index: 1; display: none; background: #fff; }
  #px { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2; display: none; }
  #ov { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 5; pointer-events: none; }
  #panel {
    position: fixed; top: 12px; left: 12px; z-index: 10;
    display: flex; flex-direction: column; gap: 8px;
    background: rgba(0,0,0,0.55); padding: 10px 12px; border-radius: 8px;
    color: #ddd; font-size: 13px; backdrop-filter: blur(6px); max-width: 340px;
  }
  #bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  #panel select, #panel button {
    background: #1a1a1a; color: #eee; border: 1px solid #444;
    border-radius: 6px; padding: 6px 8px; font-size: 13px; cursor: pointer;
  }
  #panel button:hover, #panel select:hover { border-color: #888; }
  #randrow { display: flex; align-items: center; gap: 6px; opacity: 0.9; }
  #textrow { display: none; }
  #pctext { width: 100%; box-sizing: border-box; background: #1a1a1a; color: #eee; border: 1px solid #444; border-radius: 6px; padding: 5px 7px; font-size: 12px; }
  #karow { display: none; flex-direction: column; gap: 5px; }
  #karow .line { display: flex; gap: 6px; }
  #kasong { flex: 1; box-sizing: border-box; background: #1a1a1a; color: #eee; border: 1px solid #444; border-radius: 6px; padding: 5px 7px; font-size: 12px; }
  #kastatus { opacity: 0.7; font-size: 11px; line-height: 1.3; }
  #hint { opacity: 0.75; line-height: 1.3; }
  #hint.err { color: #ff8a8a; opacity: 1; }
  #panel.hidden { opacity: 0; pointer-events: none; transition: opacity .4s; }
  #toggle {
    position: fixed; top: 12px; left: 12px; z-index: 11;
    width: 30px; height: 30px; border-radius: 6px; cursor: pointer;
    background: rgba(0,0,0,0.55); color: #eee; border: 1px solid #444;
    font-size: 16px; line-height: 1; backdrop-filter: blur(6px); display: none;
  }
  #knobs { display: flex; flex-direction: column; gap: 5px; }
  .knob { display: grid; grid-template-columns: 70px 1fr 38px; gap: 8px; align-items: center; }
  .knob label { opacity: 0.8; }
  .knob input[type=range] { width: 100%; }
  .knob .val { opacity: 0.7; text-align: right; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<canvas id="c"></canvas>                                  <!-- Hydra output (face mode) -->
<video  id="bg" autoplay muted playsinline></video>       <!-- capture source (focal + pixelcrash) -->
<canvas id="px"></canvas>                                 <!-- ASCII output (pixelcrash mode) -->
<video id="lv" playsinline style="display:none"></video>  <!-- local file source (karaoke local) -->
<video id="cam" muted playsinline style="display:none"></video> <!-- webcam (karaoke local face copies) -->
<canvas id="maskcanvas" style="display:none"></canvas>    <!-- ellipse mask -> Hydra s3 -->
<canvas id="ov"></canvas>                                 <!-- shared overlay: boxes/lines/labels -->
<button id="toggle" title="Show controls">&#8801;</button>

<div id="panel">
  <div id="bar">
    <select id="mode"></select>
    <select id="source" title="input source"><option value="screen">Screen tab</option><option value="webcam">Webcam</option></select>
    <select id="camera" title="which camera"></select>
    <button id="run">Run</button>
    <button id="hide">Hide</button>
  </div>
  <div id="randrow"><input type="checkbox" id="random"><label for="random">Random changes</label></div>
  <div id="textrow"><input id="pctext" type="text" value="" placeholder="custom text, or leave empty to label body parts"></div>
  <div id="karow">
    <div class="line"><select id="kalib" style="flex:1"><option value="">(downloaded songs appear here)</option></select></div>
    <div class="line"><input id="kasong" type="text" placeholder="paste YouTube URL (or artist title, or [mm:ss] LRC)"><button id="kafetch">Lyrics</button><button id="kastart">Start</button><button id="kapause">Pause</button></div>
    <div class="line"><input id="katime" type="range" min="0" max="1000" value="0" style="flex:1"><span id="katimelbl" style="opacity:0.7;font-variant-numeric:tabular-nums">0:00</span></div>
    <span id="kastatus"></span>
  </div>
  <div id="knobs"></div>
  <span id="hint"></span>
</div>

<script src="https://unpkg.com/hydra-synth"></script>

<script>
// easter egg for whoever opens the console.
console.log('%cpixelate_me', 'color:#ffe24d;font:bold 22px monospace');
console.log('%cthe scan that scans without a scanner.   ( type  secret()  and press enter )', 'color:#79c0ff');
window.secret = function () {
  const a = 'https://www.youtube.com/watch?v=YTWHFJWjAjU';
  const b = 'https://www.youtube.com/watch?v=DVprerMi5Dg';
  console.log('%ctwo clips:', 'color:#ffe24d;font:bold 15px monospace');
  console.log('%c1.  ./add-song.sh "' + a + '"   ->  Karaoke (local)\n2.  ./add-song.sh "' + b + '"   ->  PixelCrash glitch', 'color:#79c0ff;font:13px monospace');
};

const hint   = document.getElementById('hint');
const panel  = document.getElementById('panel');
const cEl    = document.getElementById('c');
const bgEl   = document.getElementById('bg');
const ov     = document.getElementById('ov');
const octx   = ov.getContext('2d');
function say(m, err) { hint.textContent = m; hint.classList.toggle('err', !!err); }

// ---- camera picker: list video inputs so you can choose the Logitech etc. ----
const cameraSel = document.getElementById('camera');
let videoInputs = [];
async function refreshCameras() {
  try {
    videoInputs = (await navigator.mediaDevices.enumerateDevices()).filter(d => d.kind === 'videoinput');
    const cur = cameraSel.value;
    cameraSel.innerHTML = '';
    videoInputs.forEach((d, i) => { const o = document.createElement('option'); o.value = d.deviceId; o.textContent = d.label || ('Camera ' + (i + 1)); cameraSel.appendChild(o); });
    if (cur && videoInputs.some(d => d.deviceId === cur)) cameraSel.value = cur;
  } catch (_) {}
}
function camConstraint() { const id = cameraSel.value; return id ? { deviceId: { exact: id } } : true; }   // exact = force the chosen camera
function selectedCameraIndex() { const i = videoInputs.findIndex(d => d.deviceId === cameraSel.value); return i < 0 ? 0 : i; }   // for Hydra initCam
refreshCameras();
if (navigator.mediaDevices) navigator.mediaDevices.addEventListener('devicechange', refreshCameras);

// ---------------------------------------------------------------------------
// Params for BOTH modes (no overlapping keys). Each mode uses a subset.
// ---------------------------------------------------------------------------
const PARAMS = {
  // face reveal
  facebox: 1.3, reveal: 0.30, hold: 0.7, faceglitch: 0.3, pixelate: 40, brightness: 0, contrast: 1, facewebcam: 0, webmix: 0.5, ocr: 0, facebright: 1.6, tiles: 0,
  // focal points
  blur: 26, saturate: 2.0, points: 16, box: 1.0, web: 2, smooth: 0.08, ink: 1, osc: 0.5,
  // pixelcrash (ASCII over segmented people)
  pcsize: 14, pcbright: 1.1, pcback: 1, pcvary: 0.6, pccalm: 0.7, pcperson: 0.4, pcwebcam: 0,
  // karaoke
  kacopies: 6, kaspread: 0.5, kasize: 60, kavol: 1.2, kadrift: 0, kawebcam: 0,
  // shared
  fps: 30,
};
const KNOBS = [
  { key: 'facebox',    label: 'Face box',   min: 1,    max: 2.2,  step: 0.05, fmt: v => v.toFixed(2) },
  { key: 'reveal',     label: 'Reveal',     min: 0.05, max: 0.6,  step: 0.01, fmt: v => v.toFixed(2) },
  { key: 'hold',       label: 'Hold',       min: 0,    max: 1,    step: 0.01, fmt: v => v.toFixed(2) },
  { key: 'faceglitch', label: 'Face glitch',min: 0,    max: 1,    step: 0.01, fmt: v => v.toFixed(2) },
  { key: 'pixelate',   label: 'Pixelate',   min: 4,    max: 160,  step: 2,    fmt: v => v.toFixed(0) },
  { key: 'brightness', label: 'Brightness', min: -0.5, max: 0.5,  step: 0.01, fmt: v => v.toFixed(2) },
  { key: 'contrast',   label: 'Contrast',   min: 0.4,  max: 2.5,  step: 0.05, fmt: v => v.toFixed(2) },
  { key: 'facewebcam', label: 'Webcam',     min: 0,    max: 1,    step: 1,    fmt: v => v.toFixed(0) },
  { key: 'webmix',     label: 'Web mix',    min: 0,    max: 1,    step: 0.05, fmt: v => v.toFixed(2) },
  { key: 'ocr',        label: 'Text copy',  min: 0,    max: 1,    step: 1,    fmt: v => v.toFixed(0) },
  { key: 'facebright', label: 'Det light',  min: 1,    max: 3,    step: 0.1,  fmt: v => v.toFixed(1) },
  { key: 'tiles',      label: 'Tiles',      min: 0,    max: 1,    step: 1,    fmt: v => v.toFixed(0) },
  { key: 'blur',       label: 'Blur',       min: 0,    max: 80,   step: 1,    fmt: v => v.toFixed(0) },
  { key: 'saturate',   label: 'Saturate',   min: 1,    max: 4,    step: 0.05, fmt: v => v.toFixed(2) },
  { key: 'points',     label: 'Points',     min: 3,    max: 16,   step: 1,    fmt: v => v.toFixed(0) },
  { key: 'box',        label: 'Box size',   min: 0.5,  max: 2.5,  step: 0.05, fmt: v => v.toFixed(2) },
  { key: 'web',        label: 'Web',        min: 0,    max: 4,    step: 1,    fmt: v => v.toFixed(0) },
  { key: 'smooth',     label: 'Drift',      min: 0.02, max: 0.4,  step: 0.01, fmt: v => v.toFixed(2) },
  { key: 'ink',        label: 'Ink',        min: 0,    max: 1,    step: 0.05, fmt: v => v.toFixed(2) },
  { key: 'osc',        label: 'Osc',        min: 0,    max: 1,    step: 0.05, fmt: v => v.toFixed(2) },
  { key: 'pcsize',     label: 'Char size',  min: 6,    max: 28,   step: 1,    fmt: v => v.toFixed(0) },
  { key: 'pcbright',   label: 'Bright',     min: 0.5,  max: 2,    step: 0.05, fmt: v => v.toFixed(2) },
  { key: 'pcback',     label: 'Backing',    min: 0,    max: 1,    step: 0.05, fmt: v => v.toFixed(2) },
  { key: 'pcvary',     label: 'Variation',  min: 0,    max: 1,    step: 0.05, fmt: v => v.toFixed(2) },
  { key: 'pccalm',     label: 'Calm',       min: 0,    max: 1,    step: 0.05, fmt: v => v.toFixed(2) },
  { key: 'pcperson',   label: 'Person',     min: 0.1,  max: 0.9,  step: 0.05, fmt: v => v.toFixed(2) },
  { key: 'pcwebcam',   label: 'Webcam',     min: 0,    max: 1,    step: 1,    fmt: v => v.toFixed(0) },
  { key: 'kacopies',   label: 'Copies',     min: 0,    max: 14,   step: 1,    fmt: v => v.toFixed(0) },
  { key: 'kaspread',   label: 'Spread',     min: 0,    max: 1,    step: 0.05, fmt: v => v.toFixed(2) },
  { key: 'kasize',     label: 'Lyric size', min: 20,   max: 140,  step: 2,    fmt: v => v.toFixed(0) },
  { key: 'kavol',      label: 'Vol size',   min: 0,    max: 3,    step: 0.1,  fmt: v => v.toFixed(1) },
  { key: 'kadrift',    label: 'Drift',      min: 0,    max: 1,    step: 0.05, fmt: v => v.toFixed(2) },
  { key: 'kawebcam',   label: 'Webcam',     min: 0,    max: 1,    step: 1,    fmt: v => v.toFixed(0) },
  { key: 'fps',        label: 'FPS',        min: 4,    max: 60,   step: 1,    fmt: v => v.toFixed(0) },
];

// time-based update throttle shared by all three modes. Between updates each
// canvas holds its last complete frame, so lower FPS = clean frame-stepping.
let lastUpdate = 0;
function dueForUpdate() {
  const now = performance.now();
  if (now - lastUpdate >= 1000 / Math.max(1, PARAMS.fps)) { lastUpdate = now; return true; }
  return false;
}
const KNOB_BY_KEY = Object.fromEntries(KNOBS.map(k => [k.key, k]));

// ---------------------------------------------------------------------------
// Hydra (face mode).
// ---------------------------------------------------------------------------
let hydra = null;
try {
  if (typeof Hydra === 'undefined') throw new Error('hydra-synth did not load (CDN blocked?).');
  hydra = new Hydra({ canvas: cEl, detectAudio: false, makeGlobal: true });
  const fit = () => { try { setResolution(window.innerWidth, window.innerHeight); } catch (_) {} };
  window.addEventListener('resize', fit); fit();
} catch (e) { say('Init failed: ' + e.message, true); console.error(e); }
function grade(chain) { return chain.brightness(() => PARAMS.brightness).contrast(() => PARAMS.contrast); }

let cleanupHooks = [];
function onCleanup(fn) { cleanupHooks.push(fn); }
function stopStream(el) { try { if (el && el.srcObject) { el.srcObject.getTracks().forEach(t => t.stop()); el.srcObject = null; } } catch (_) {} }

// ---------------------------------------------------------------------------
// FACE MODE: BlazeFace -> ellipse mask (Hydra s3) + thin frames + curvy links.
// ---------------------------------------------------------------------------
function waitForCaptureVideo(source, timeoutMs = 60000) {
  return new Promise((resolve, reject) => {
    const t0 = performance.now();
    (function check() {
      const v = source.src;
      if (v && v.videoWidth > 0) return resolve(v);
      if (performance.now() - t0 > timeoutMs) return reject(new Error('Capture never started (no tab picked).'));
      requestAnimationFrame(check);
    })();
  });
}

// ---- periodic OCR: copy text/numbers from the stream as drifting overlays ----
let ocrWorker = null, ocrItems = [], ocrRunning = false, ocrTimer = 0;
const ocrSample = document.createElement('canvas');
function ensureTesseract() {
  if (window.Tesseract) return Promise.resolve();
  return new Promise((res, rej) => { const s = document.createElement('script'); s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'; s.onload = res; s.onerror = () => rej(new Error('Tesseract load failed')); document.head.appendChild(s); });
}
async function startOCR(getVideo) {
  say('Loading OCR (one-time ~3MB)...');
  await ensureTesseract();
  if (!ocrWorker) ocrWorker = await Tesseract.createWorker('eng');
  ocrRunning = true;
  const scan = async () => {
    if (!ocrRunning) return;
    const v = getVideo();
    if (v && v.videoWidth) {
      const sw = 640, sh = Math.max(1, Math.round(sw * v.videoHeight / v.videoWidth));
      ocrSample.width = sw; ocrSample.height = sh;
      ocrSample.getContext('2d').drawImage(v, 0, 0, sw, sh);
      try {
        const { data } = await ocrWorker.recognize(ocrSample);
        const words = (data.words || []).filter(w => w.confidence > 60 && w.text.trim().length >= 2);
        ocrItems = words.slice(0, 12).map(w => ({ text: w.text.trim(), x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, vx: (Math.random()*2-1)*1.3, vy: (Math.random()*2-1)*1.3 }));
      } catch (_) {}
    }
    if (ocrRunning) ocrTimer = setTimeout(scan, 2500);   // re-scan every 2.5s
  };
  scan();
}
function stopOCR() { ocrRunning = false; clearTimeout(ocrTimer); ocrItems = []; }
// drift + draw the OCR copies on the overlay (called each frame from the face loop)
function drawOCR(W, H) {
  if (!ocrItems.length) return;
  octx.font = 'bold 22px ui-monospace, Menlo, monospace'; octx.textAlign = 'left'; octx.textBaseline = 'top';
  octx.lineWidth = 3; octx.lineJoin = 'round';
  for (const it of ocrItems) {
    it.x += it.vx; it.y += it.vy;
    if (it.x < 0 || it.x > W - 60) it.vx *= -1;
    if (it.y < 0 || it.y > H - 24) it.vy *= -1;
    octx.strokeStyle = '#000'; octx.strokeText(it.text, it.x, it.y);
    octx.fillStyle = '#ffe24d'; octx.fillText(it.text, it.x, it.y);
  }
}

async function startFaceDetection() {
  say('Waiting for tab capture (pick the Kick tab)...');
  const video = await waitForCaptureVideo(s0);
  say('Loading face model...');
  const vision = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12');
  const fileset = await vision.FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/wasm');
  const detector = await vision.FaceDetector.createFromOptions(fileset, {
    baseOptions: { modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite', delegate: 'GPU' },
    runningMode: 'VIDEO',
    minDetectionConfidence: 0.3,   // catch smaller / farther / fainter faces
  });
  const mc = document.getElementById('maskcanvas'); const ctx = mc.getContext('2d');
  s3.init({ src: mc, dynamic: true });
  let connFrame = 0, connections = [];
  function regen(n) { connections = []; for (let i = 0; i < n; i++) for (let j = i + 1; j < n; j++) if (Math.random() < 0.55) connections.push([i, j, Math.random() * 2 - 1]); }

  let rafId = 0, lastTs = -1, running = true;
  // detection input gets a brightness boost (helps dim rooms); optional 2x2 tiling
  // (Tiles=1) re-detects per quadrant so smaller/farther faces register.
  const detCanvas = document.createElement('canvas'), dctx = detCanvas.getContext('2d', { willReadFrequently: true });
  const tileCanvas = document.createElement('canvas'), tctx = tileCanvas.getContext('2d', { willReadFrequently: true });
  const nextTs = () => { let t = performance.now(); if (t <= lastTs) t = lastTs + 1; lastTs = t; return t; };
  function detectFaces(vw, vh) {
    if (detCanvas.width !== vw) detCanvas.width = vw;
    if (detCanvas.height !== vh) detCanvas.height = vh;
    dctx.filter = `brightness(${PARAMS.facebright}) contrast(1.15)`;   // boost the detector's view only
    dctx.drawImage(video, 0, 0, vw, vh);
    dctx.filter = 'none';
    if (!PARAMS.tiles) { try { return detector.detectForVideo(detCanvas, nextTs()).detections || []; } catch (_) { return []; } }
    const all = [], ovf = 0.14;
    for (let r = 0; r < 2; r++) for (let c = 0; c < 2; c++) {
      const tw = vw / 2, th = vh / 2;
      const tx = Math.max(0, c * tw - tw * ovf), ty = Math.max(0, r * th - th * ovf);
      const cw = Math.min(tw * (1 + 2 * ovf), vw - tx), ch = Math.min(th * (1 + 2 * ovf), vh - ty);
      if (tileCanvas.width !== Math.round(cw)) tileCanvas.width = Math.round(cw);
      if (tileCanvas.height !== Math.round(ch)) tileCanvas.height = Math.round(ch);
      tctx.drawImage(detCanvas, tx, ty, cw, ch, 0, 0, tileCanvas.width, tileCanvas.height);
      let dd = []; try { dd = detector.detectForVideo(tileCanvas, nextTs()).detections || []; } catch (_) {}
      for (const d of dd) { const b = d.boundingBox; all.push({ boundingBox: { originX: tx + b.originX, originY: ty + b.originY, width: b.width, height: b.height } }); }
    }
    const out = [];   // merge faces found in overlapping tiles by centre proximity
    for (const d of all) {
      const b = d.boundingBox, cx = b.originX + b.width / 2, cy = b.originY + b.height / 2;
      if (out.some(o => { const ob = o.boundingBox; return Math.hypot(cx - (ob.originX + ob.width / 2), cy - (ob.originY + ob.height / 2)) < Math.max(b.width, ob.width) * 0.5; })) continue;
      out.push(d);
    }
    return out;
  }
  function loop() {
    if (!running) return;
    if (hydra) hydra.synth.fps = PARAMS.fps >= 60 ? null : PARAMS.fps;   // cap Hydra's render too
    if (dueForUpdate() && video.readyState >= 2 && video.videoWidth) {
      if (mc.width !== video.videoWidth) mc.width = video.videoWidth;
      if (mc.height !== video.videoHeight) mc.height = video.videoHeight;
      const dets = detectFaces(video.videoWidth, video.videoHeight);
      const fade = Math.max(0.012, 0.30 * (1 - PARAMS.hold));
      ctx.filter = 'none'; ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,' + fade + ')'; ctx.fillRect(0, 0, mc.width, mc.height);
      ctx.filter = 'blur(' + Math.round(mc.width * PARAMS.reveal * 0.05) + 'px)'; ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.35;
      const grow = PARAMS.facebox;
      for (const d of dets) { const b = d.boundingBox; const cx = b.originX + b.width/2, cy = b.originY + b.height/2; const rx = (b.width*grow)/2, ry = (b.height*grow)/2*1.18; ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2); ctx.fill(); }
      ctx.globalAlpha = 1; ctx.filter = 'none';

      if (ov.width !== window.innerWidth) ov.width = window.innerWidth;
      if (ov.height !== window.innerHeight) ov.height = window.innerHeight;
      octx.clearRect(0, 0, ov.width, ov.height);
      const sx = ov.width / mc.width, sy = ov.height / mc.height;
      const boxes = dets.map(d => d.boundingBox).sort((a, b) => a.originX - b.originX);
      if (boxes.length > 1) {
        if (connFrame % 50 === 0) regen(boxes.length);
        octx.lineWidth = 1; octx.strokeStyle = 'rgba(255,255,255,0.45)';
        for (const [i, j, bow] of connections) {
          if (i >= boxes.length || j >= boxes.length) continue;
          const a = boxes[i], c = boxes[j];
          const x1 = (a.originX + a.width) * sx, y1 = (a.originY + a.height/2) * sy;
          const x2 = c.originX * sx, y2 = (c.originY + c.height/2) * sy;
          const mx = (x1 + x2)/2, my = (y1 + y2)/2, dx = x2 - x1, dy = y2 - y1, len = Math.hypot(dx, dy) || 1;
          octx.beginPath(); octx.moveTo(x1, y1); octx.quadraticCurveTo(mx + (-dy/len)*bow*len*0.22, my + (dx/len)*bow*len*0.22, x2, y2); octx.stroke();
        }
      } else connections = [];
      drawOCR(ov.width, ov.height);   // drifting copies of any detected text/numbers
      connFrame++;
    }
    rafId = requestAnimationFrame(loop);
  }
  loop();
  onCleanup(() => { running = false; cancelAnimationFrame(rafId); try { detector.close(); } catch (_) {} });
}

// ---------------------------------------------------------------------------
// FOCAL MODE: melted stream + chroma focal points + dashed curvy web.
// ---------------------------------------------------------------------------
const GW = 96, GH = 54;
const sc = document.createElement('canvas'); sc.width = GW; sc.height = GH;
const sctx = sc.getContext('2d', { willReadFrequently: true });
let focalRunning = false, focalFrame = 0, tracked = [];

function sourceIsWebcam() { return document.getElementById('source').value === 'webcam'; }
async function startStreamCapture() {
  let stream;
  if (sourceIsWebcam()) {
    say('Allow the camera...');
    stream = await navigator.mediaDevices.getUserMedia({ video: camConstraint(), audio: false });
    refreshCameras();   // labels become available after permission
  } else {
    say('Pick the tab/screen in the share dialog...');
    stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });

  if (dueForUpdate() && kaVid && kaVid.videoWidth) {
    const W = window.innerWidth, H = window.innerHeight;
    if (pxEl.width !== W) pxEl.width = W;
    if (pxEl.height !== H) pxEl.height = H;
    // detect faces. webcam off -> always the music video. webcam on -> alternate
    // cam/video each detection tick so both stay fresh at ~the same cost.
    kaUpd++;
    const useCam = !!PARAMS.kawebcam && camStarted && camEl.videoWidth;
    if (kaFaceDet && kaUpd % 4 === 0) {
      let ts = performance.now(); if (ts <= kaLastTs) ts = kaLastTs + 1; kaLastTs = ts;
      const detectCam = useCam && (((kaUpd >> 2) & 1) === 1);
      try { const d = kaFaceDet.detectForVideo(detectCam ? camEl : kaVid, ts).detections || []; if (detectCam) camFaces = d; else kaFaces = d; } catch (_) {}
    }

    pxc.drawImage(kaVid, 0, 0, W, H);   // background is always the music video

    // smoothed music-video face region
    const vW = kaVid.videoWidth, vH = kaVid.videoHeight;
    const vidCtr = { originX: vW*0.35, originY: vH*0.3, width: vW*0.3, height: vH*0.4 };
    const vtarget = kaFaces.length ? kaFaces[0].boundingBox : vidCtr;
    if (!kaRegion) kaRegion = { originX: vtarget.originX, originY: vtarget.originY, width: vtarget.width, height: vtarget.height };
    else { const k = 0.2; kaRegion.originX += (vtarget.originX-kaRegion.originX)*k; kaRegion.originY += (vtarget.originY-kaRegion.originY)*k; kaRegion.width += (vtarget.width-kaRegion.width)*k; kaRegion.height += (vtarget.height-kaRegion.height)*k; }
    const cW = camEl.videoWidth || 1, cH = camEl.videoHeight || 1;
    const camCtr = { originX: cW*0.35, originY: cH*0.3, width: cW*0.3, height: cH*0.4 };

    const copies = Math.round(PARAMS.kacopies), spread = PARAMS.kaspread, drift = PARAMS.kadrift;
    if (kaCopyState.length !== copies) {           // (re)build state when the count changes
      kaCopyState = [];
      for (let i = 1; i <= copies; i++) {
        const dir = i * 2.0;                        // each copy a different direction
        kaCopyState.push({ x: W/2, y: H/2, vx: Math.cos(dir), vy: Math.sin(dir), sc: 1 - (i/(copies+2))*0.5, idx: i });
      }
    }
    for (const cs of kaCopyState) {
      // mixed: webcam on -> odd copies = your webcam face, even = music-video face (~half/half)
      let srcEl, reg, sW, sH;
      if (useCam && (cs.idx % 2 === 1)) {
        srcEl = camEl; sW = cW; sH = cH;
        reg = camFaces.length ? camFaces[((cs.idx - 1) >> 1) % camFaces.length].boundingBox : camCtr;
      } else {
        srcEl = kaVid; sW = vW; sH = vH; reg = kaRegion;
      }
      const cw = (reg.width / sW * W) * cs.sc, ch = (reg.height / sH * H) * cs.sc;
      if (drift > 0) {                              // DVD-style: drift each copy, bounce off edges
        cs.x += cs.vx * drift * 2.4; cs.y += cs.vy * drift * 2.4;
        if (cs.x < 0) { cs.x = 0; cs.vx = Math.abs(cs.vx); } else if (cs.x > W - cw) { cs.x = W - cw; cs.vx = -Math.abs(cs.vx); }
        if (cs.y < 0) { cs.y = 0; cs.vy = Math.abs(cs.vy); } else if (cs.y > H - ch) { cs.y = H - ch; cs.vy = -Math.abs(cs.vy); }
      } else {                                       // drift off: static golden-angle scatter (Spread responsive)
        const ang = cs.idx * 2.39996, rad = spread * Math.min(W, H) * 0.45 * (cs.idx / Math.max(1, copies));
        cs.x = W/2 + Math.cos(ang) * rad - cw/2; cs.y = H/2 + Math.sin(ang) * rad - ch/2;
      }
      pxc.globalAlpha = 0.9;
      pxc.drawImage(srcEl, reg.originX, reg.originY, reg.width, reg.height, cs.x, cs.y, cw, ch);
    }
    pxc.globalAlpha = 1;

    // lyrics: local anchors the first line to the first sound (auto-cancels any
    // leading silence/offset); capture uses the Start clock.
    let elapsed = null;
    if (kaLocalMode) {
      if (kaLrc.length) {
        if (kaSrtMode) {
          elapsed = kaVid.currentTime;                 // SRT cues are timed to the video
        } else {
          if (kaOnset === null && kaVid.currentTime > 0.1 && kaVolume() > 0.05) kaOnset = kaVid.currentTime;
          elapsed = (kaOnset !== null) ? (kaVid.currentTime - kaOnset + kaLrc[0].t) : -1;
        }
      }
    } else if (kaLrc.length && kaStart) elapsed = (performance.now() - kaStart) / 1000;
    if (elapsed != null) {
      const idx = kaCurrentIndex(elapsed);
      if (idx >= 0) {
        kaVolSmooth += (kaVolume() - kaVolSmooth) * 0.15;                       // smooth so size doesn't jitter
        const size = PARAMS.kasize * (1 + Math.min(1, kaVolSmooth * PARAMS.kavol * 2));
        drawKaraokeLyrics(pxc, W, H, idx, size);                                // wrapped + auto-fit
      }
    }
    if (kaLocalMode) kaSyncTimeline(kaVid.currentTime, kaVid.duration);         // update scrubber
  }
  requestAnimationFrame(kaLoop);
}

// ---------------------------------------------------------------------------
// Modes.
// ---------------------------------------------------------------------------
const MODES = {
  'Melting': {
    knobs: ['facebox', 'reveal', 'hold', 'faceglitch', 'pixelate', 'facebright', 'tiles', 'ocr', 'brightness', 'contrast', 'fps'],
    hint: "Heavy glitch; faces melt as distorted ellipses. Det light brightens the detector's view (dim rooms); Tiles=1 finds smaller/farther faces (a bit heavier). Text copy=1 floats detected text.",
    async start() {
      if (sourceIsWebcam()) s0.initCam(selectedCameraIndex()); else await s0.initScreen();   // webcam or screen as the source
      if (PARAMS.facewebcam) { try { s1.initCam(); } catch (_) {} }
      // base = source stream, optionally blended with the webcam
      const base = () => PARAMS.facewebcam ? src(s0).blend(src(s1), () => PARAMS.webmix) : src(s0);
      // heavy glitch background
      base().color(1.04, 0, -1.1).rotate(0.30, 0.1)
        .pixelate(() => PARAMS.pixelate, () => PARAMS.pixelate)
        .modulate(noise(2.5), () => 1.5 * Math.sin(0.08 * time))
        .out(o1);
      // face layer: SAME melting warp as the background blobs (so the face melts/distorts
      // too), keeping its colour. Face glitch adds extra warp on top.
      const faceLayer = base().color(1.04, 0, -1.1)
        .modulate(noise(2.5), () => 1.5 * Math.sin(0.08 * time))
        .modulate(noise(2, 0.3), () => PARAMS.faceglitch * 0.06)
        .pixelate(() => 340 - PARAMS.faceglitch * 230, () => 340 - PARAMS.faceglitch * 230);
      await startFaceDetection();
      if (PARAMS.ocr) startOCR(() => s0.src).catch(e => say('OCR failed: ' + e.message, true));
      // crossfade face vs background with complementary masks (no dark-ring halo):
      // face*mask + background*(1-mask) sums to full brightness at the feathered edge.
      grade(faceLayer.mask(src(s3)).add(src(o1).mask(src(s3).invert()))).out(o0);
      render(o0);
      onCleanup(() => { stopStream(s0.src); stopOCR(); });
    }
  },
  'PixelCrash glitch': {
    knobs: ['pcsize', 'pcback', 'pccalm', 'pcperson', 'pcwebcam', 'fps'],
    hint: "People are spelled out in text (body-part labels, or your own text above). Webcam=1 overlays YOUR segmented body on top of the screen video. Background stays clean.",
    async start() {
      await startStreamCapture();
      if (PARAMS.pcwebcam) { try { await ensureWebcam(); } catch (e) { say('Webcam blocked: ' + e.message, true); } }
      say('Loading person model...');
      pcSeg = await loadPersonSegmenter();
      pcLastTs = -1; pcSmooth = null; pcMaskArr = null; pcMaskSmooth = null; camMaskArr = null;
      say('Running. People are ASCII; the background is clean.');
      pcRunning = true;
      pcLoop();
      onCleanup(() => { pcRunning = false; try { pcSeg && pcSeg.close(); } catch (_) {} pcSeg = null; stopStream(bgEl); stopWebcam(); });
    }
  },
  'Karaoke (local)': {
    knobs: ['kacopies', 'kaspread', 'kasize', 'kavol', 'kadrift', 'kawebcam', 'fps'],
    hint: "Plays karaoke.mp4: auto-sync lyrics, face-multiply, volume-reactive size. Set Webcam=1 (grants camera) to multiply YOUR face over it instead of the video's.",
    async start() {
      kaVid = lvEl; kaLocalMode = true; kaOnset = null;
      if (PARAMS.kawebcam) { try { await ensureWebcam(); } catch (e) { say('Webcam blocked: ' + e.message, true); } }
      const _opt = kalib.selectedOptions && kalib.selectedOptions[0];
      const _file = (_opt && _opt.value) ? _opt.value : 'karaoke.mp4';
      const _srt = _opt && _opt.dataset.srt;
      try { await startKaraokeLocal(_file); } catch (e) { say('Error: ' + e.message, true); return; }
      // lyrics: use the video's own SRT subtitles directly (timed to the video);
      // fall back to lrclib only if there is no SRT.
      if (_srt) {
        kaSrtMode = true;
        try { kaLrc = parseSRT(await (await fetch(_srt)).text()); kaStatus(`${kaLrc.length} subtitle lines from ${_srt}`); }
        catch (e) { kaStatus('SRT load failed: ' + e.message); }
      } else {
        kaSrtMode = false;
        const url = (_opt && _opt.dataset.url) ? _opt.dataset.url : document.getElementById('kasong').value.trim();
        if (url) fetchLyrics(url);
      }
      say('Loading face model...');
      kaFaceDet = await loadFaceDetector();
      kaFaces = []; kaLastTs = -1; kaUpd = 0; kaRegion = null; kaCopyState = [];
      say('Running. Lyrics auto-fetch from the box URL and sync to the file.');
      kaRunning = true;
      kaLoop();
      onCleanup(() => { kaRunning = false; try { lvEl.pause(); } catch (_) {} try { kaFaceDet && kaFaceDet.close(); } catch (_) {} kaFaceDet = null; stopWebcam(); });
    }
  },
  'Karaoke (capture)': {
    knobs: ['kacopies', 'kaspread', 'kasize', 'kavol', 'kadrift', 'fps'],
    hint: "Tab-capture (tick Share tab audio). Lyrics, then Start at the song start. Lyrics grow with the singing; the face (or centre object) is multiplied out. Sync is manual.",
    async start() {
      kaVid = bgEl; kaLocalMode = false;
      await startKaraokeCapture();
      say('Loading face model...');
      kaFaceDet = await loadFaceDetector();
      kaFaces = []; kaLastTs = -1; kaUpd = 0; kaRegion = null; kaCopyState = [];
      say('Running. Fetch lyrics, then click Start at the song start.');
      kaRunning = true;
      kaLoop();
      onCleanup(() => { kaRunning = false; try { kaFaceDet && kaFaceDet.close(); } catch (_) {} kaFaceDet = null; try { kaAudioCtx && kaAudioCtx.close(); } catch (_) {} kaAudioCtx = null; kaAnalyser = null; stopStream(bgEl); });
    }
  },
  'Focal points': {
    knobs: ['blur', 'saturate', 'points', 'box', 'smooth', 'ink', 'osc', 'fps'],
    hint: "Stream melts into color; labeled boxes track focal points. Osc blends a Hydra pattern on top.",
    async start() {
      await startStreamCapture();
      // osc pattern rendered by Hydra, blended over the melted stream (Osc slider = opacity)
      osc(5, -0.126, 0.514).rotate(0, 0.1).pixelate(40, 40).out(o0); render(o0);
      focalRunning = true; focalFrame = 0; tracked = [];
      focalLoop();
      onCleanup(() => { focalRunning = false; stopStream(bgEl); });
    }
  },
};

// ---------------------------------------------------------------------------
// Sliders (rebuilt per mode) + random changer.
// ---------------------------------------------------------------------------
const knobsEl = document.getElementById('knobs');
let sliderRefs = {};
function renderKnobs(keys) {
  knobsEl.innerHTML = ''; sliderRefs = {};
  for (const k of KNOBS) {
    if (!keys.includes(k.key)) continue;
    const row = document.createElement('div'); row.className = 'knob';
    const lab = document.createElement('label'); lab.textContent = k.label;
    const inp = document.createElement('input'); inp.type = 'range'; inp.min = k.min; inp.max = k.max; inp.step = k.step; inp.value = PARAMS[k.key];
    const val = document.createElement('span'); val.className = 'val'; val.textContent = k.fmt(PARAMS[k.key]);
    inp.addEventListener('input', () => {
      PARAMS[k.key] = parseFloat(inp.value); val.textContent = k.fmt(PARAMS[k.key]);
      if (k.key === 'kawebcam' || k.key === 'pcwebcam') { if (PARAMS[k.key]) ensureWebcam().catch(e => say('Webcam blocked: ' + e.message, true)); else stopWebcam(); }
    });
    row.append(lab, inp, val); knobsEl.appendChild(row);
    sliderRefs[k.key] = { input: inp, val, fmt: k.fmt };
  }
}
function updateSlider(key, v) { const r = sliderRefs[key]; if (r) { r.input.value = v; r.val.textContent = r.fmt(v); } }

let randomOn = false;
const RANDOM_EXCLUDE = new Set(['ink', 'points', 'fps']);   // kept fixed during random changes
document.getElementById('random').addEventListener('change', e => randomOn = e.target.checked);
// every ~2.2s, nudge a random subset of the current mode's sliders to new values
setInterval(() => {
  if (!randomOn || !currentMode) return;
  for (const key of MODES[currentMode].knobs) {
    if (RANDOM_EXCLUDE.has(key)) continue;
    if (Math.random() < 0.45) {
      const k = KNOB_BY_KEY[key];
      let v = k.min + Math.random() * (k.max - k.min);
      if (k.step >= 1) v = Math.round(v);
      PARAMS[key] = v; updateSlider(key, v);
    }
  }
}, 2200);

// ---------------------------------------------------------------------------
// UI wiring.
// ---------------------------------------------------------------------------
const modeSel = document.getElementById('mode');
for (const name of Object.keys(MODES)) { const o = document.createElement('option'); o.value = name; o.textContent = name; modeSel.appendChild(o); }

let currentMode = null;
function stopCurrent() {
  for (const fn of cleanupHooks) { try { fn(); } catch (_) {} }
  cleanupHooks = [];
  try { hush(); } catch (_) {}
  try { if (hydra) hydra.synth.fps = null; } catch (_) {}   // uncap Hydra
  try { octx.clearRect(0, 0, ov.width, ov.height); } catch (_) {}
  lastUpdate = 0;   // next mode updates immediately
  currentMode = null;
}
function setVisibility(name) {
  const focal = name === 'Focal points';
  const pc = name === 'PixelCrash glitch';
  const kac = name === 'Karaoke (capture)';
  const kal = name === 'Karaoke (local)';
  bgEl.style.display = (focal || pc || kac) ? 'block' : 'none';  // capture source
  bgEl.style.filter = focal ? '' : 'none';                       // only focal melts the bg
  pxEl.style.display = (pc || kac || kal) ? 'block' : 'none';    // 2D canvas: ascii / capture / local karaoke
  cEl.style.display = (pc || kac || kal) ? 'none' : 'block';
  cEl.style.mixBlendMode = focal ? 'overlay' : 'normal';
  cEl.style.opacity = focal ? PARAMS.osc : 1;
}
function syncControls() {
  renderKnobs(MODES[modeSel.value].knobs);
  document.getElementById('textrow').style.display = modeSel.value === 'PixelCrash glitch' ? 'block' : 'none';
  document.getElementById('karow').style.display = modeSel.value.startsWith('Karaoke') ? 'flex' : 'none';
  if (modeSel.value.startsWith('Karaoke')) loadLibrary();   // refresh downloaded-song list
  if (!hint.classList.contains('err')) say(MODES[modeSel.value].hint);
}

async function runCurrent() {
  if (modeSel.value === 'Melting' && !hydra) { say('Synth not ready.', true); return; }
  stopCurrent();
  setVisibility(modeSel.value);
  currentMode = modeSel.value;
  hint.classList.remove('err');
  try { await MODES[currentMode].start(); } catch (e) { say('Error: ' + e.message, true); console.error(e); }
}

modeSel.addEventListener('change', () => { stopCurrent(); hint.classList.remove('err'); syncControls(); });
document.getElementById('run').addEventListener('click', runCurrent);
document.getElementById('kafetch').addEventListener('click', () => fetchLyrics(document.getElementById('kasong').value));
document.getElementById('kastart').addEventListener('click', () => {
  const m = modeSel.value;
  if (m === 'Karaoke (local)') { try { lvEl.currentTime = 0; lvEl.play(); } catch (_) {} kaOnset = null; kaStatus('Restarted from the top.'); }
  else { kaStart = performance.now(); kaStatus(kaLrc.length ? 'Lyric clock started.' : 'Started, but no lyrics loaded yet.'); }   // capture: re-zero the clock
});

// pause/play + scrubbable timeline (local karaoke)
const kaPauseBtn = document.getElementById('kapause'), kaTime = document.getElementById('katime'), kaTimeLbl = document.getElementById('katimelbl');
let kaScrubbing = false;
function fmtTime(s) { s = Math.max(0, s || 0); return Math.floor(s / 60) + ':' + Math.floor(s % 60).toString().padStart(2, '0'); }
function kaIsLocal() { return modeSel.value === 'Karaoke (local)'; }
kaPauseBtn.addEventListener('click', () => {
  if (kaIsLocal()) { if (lvEl.paused) { lvEl.play(); kaPauseBtn.textContent = 'Pause'; } else { lvEl.pause(); kaPauseBtn.textContent = 'Play'; } }
});
kaTime.addEventListener('input', () => {
  kaScrubbing = true;
  const frac = kaTime.value / 1000;
  if (kaIsLocal() && lvEl.duration) { lvEl.currentTime = frac * lvEl.duration; kaTimeLbl.textContent = fmtTime(lvEl.currentTime); }
});
kaTime.addEventListener('change', () => { kaScrubbing = false; });
// keep the timeline in sync with playback (called from the karaoke loops)
function kaSyncTimeline(cur, dur) {
  if (kaScrubbing || !dur) return;
  kaTime.value = (cur / dur) * 1000;
  kaTimeLbl.textContent = fmtTime(cur) + ' / ' + fmtTime(dur);
}

// downloaded-song library (karaoke-videos.json maintained by add-song.sh)
const kalib = document.getElementById('kalib'), kasongEl = document.getElementById('kasong');
async function loadLibrary() {
  try {
    const lib = await (await fetch('karaoke-videos.json?_=' + Date.now())).json();
    const cur = kalib.value;
    kalib.innerHTML = '';
    for (const e of lib) { const o = document.createElement('option'); o.value = e.file; o.dataset.url = e.url || ''; o.dataset.srt = e.srt || ''; o.textContent = e.title || e.file; kalib.appendChild(o); }
    if (lib.length) { kalib.value = cur || lib[0].file; const o = kalib.selectedOptions[0]; if (o && o.dataset.url && !kasongEl.value) kasongEl.value = o.dataset.url; }
  } catch (_) { /* no library yet */ }
}
kalib.addEventListener('change', () => { const o = kalib.selectedOptions[0]; if (o && o.dataset.url) kasongEl.value = o.dataset.url; });
loadLibrary();
const toggle = document.getElementById('toggle');
function setPanel(v) { panel.classList.toggle('hidden', !v); toggle.style.display = v ? 'none' : 'block'; }
document.getElementById('hide').addEventListener('click', () => setPanel(false));
toggle.addEventListener('click', () => setPanel(true));
window.addEventListener('keydown', e => { if (e.key === 'Escape') setPanel(panel.classList.contains('hidden')); });

syncControls();
</script>
</body>
</html>
